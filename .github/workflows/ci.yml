name: CORTEX CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

  figures:
    name: Figure Generation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install matplotlib numpy

      - name: Generate figures
        run: python experiments/scripts/plot_figures.py

      - name: Upload figures
        uses: actions/upload-artifact@v4
        with:
          name: paper-figures
          path: paper/figures/

  validate:
    name: Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run validation
        run: node experiments/scripts/run_validation.js
