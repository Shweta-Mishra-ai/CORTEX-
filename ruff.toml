[tool.ruff]
target-version = "py39"
line-length = 100
exclude = [
    ".git", "__pycache__", ".venv", "venv",
    "experiments/repos", "build", "dist",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long — handled by formatter
    "B008",  # do not perform function calls in default arguments
    "N806",  # variable in function should be lowercase (allow matrix math naming)
]

[tool.ruff.lint.isort]
known-first-party = ["cortex"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
